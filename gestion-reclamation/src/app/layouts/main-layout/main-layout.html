<div class="app-shell">

  <aside class="modern-sidebar">
    <div class="sidebar-brand-area">
      <div class="brand-logo-full">
        <img class="brand-logo-image" src="/assets/alamana-logo.png" alt="Al Amana Microfinance" />
      </div>
    </div>

    <div class="sidebar-scrollable-content">
      <div class="menu-group">
        <span class="menu-group-title">Espace Personnel</span>

        <a routerLink="/dashboard" routerLinkActive="active-route" class="sidebar-nav-link">
          <span class="nav-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="11" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          </span>
          <span class="nav-text-label">Vue d'ensemble</span>
          <span class="active-pill"></span>
        </a>

      </div>
    </div>

    <div class="sidebar-footer-area">
      <button (click)="onLogout()" class="sidebar-logout-action">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <main class="workspace-viewport">
    <header class="workspace-glass-header">
      <div class="header-breadcrumb">
        <span class="breadcrumb-root">Portail Citoyen</span>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-active">Suivi des Demandes</span>
      </div>

      <div class="header-actions">
        <div class="search-box-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" placeholder="Recherche rapide..." class="search-input" [(ngModel)]="searchQuery" (input)="onSearchChange(searchQuery)">
        </div>
        <div class="profile-card">
          <div class="avatar-ring">
            <div class="avatar-initials">MC</div>
            <span class="status-indicator-dot"></span>
          </div>
          <div class="profile-details">
            <span class="profile-name">Mon Compte</span>
            <span class="profile-role">Client Al Amana</span>
          </div>
        </div>
      </div>
    </header>

    <div class="workspace-body-content">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
